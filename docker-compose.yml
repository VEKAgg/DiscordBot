services:
  discord-bot:
    build: .
    image: veka-discord-bot:latest
    container_name: veka-discord-bot
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
      # DATABASE_URL is expected to be provided in the .env file
    networks:
      - veka-network

networks:
  veka-network:
    driver: bridge

