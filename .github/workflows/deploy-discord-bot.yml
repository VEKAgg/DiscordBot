name: Deploy Discord Bot

on:
  push:
    branches:
      - main
      - production

jobs:
  deploy:
    if: startsWith(github.event.head_commit.message, 'Merge pull request')
    runs-on: [self-hosted, X64, Linux, Veka]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        shell: bash
        run: |
          {
            echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}"
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            echo "ADMIN_IDS=${{ vars.ADMIN_IDS }}"
            echo "OWNER_IDS=${{ vars.OWNER_IDS }}"
            echo "ADMIN_ALERT_CHANNEL_ID=${{ vars.ADMIN_ALERT_CHANNEL_ID }}"
            echo "COMMIT_SHA=${{ github.sha }}"
            echo "BOT_VERSION=${{ github.sha }}"
            echo "LOG_LEVEL=${{ vars.LOG_LEVEL || 'INFO' }}"
            echo "GIT_BRANCH=${{ github.ref_name }}"
            echo "ENVIRONMENT=production"
          } > .env

      - name: Build and deploy
        shell: bash
        run: |
          mkdir -p logs
          docker compose down || true
          docker compose up -d --build

      - name: Health check
        shell: bash
        run: |
          MAX_WAIT=60
          INTERVAL=5
          ELAPSED=0
          SUCCESS=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if docker logs veka-discord-bot 2>&1 | grep -q "is ready. DB available"; then
              echo "Health check passed - Bot is ready"
              SUCCESS=1
              break
            fi
            echo "Waiting for bot to become ready... ($ELAPSED seconds elapsed)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED+INTERVAL))
          done

          if [ $SUCCESS -ne 1 ]; then
            echo "Health check failed - Bot did not become ready within $MAX_WAIT seconds"
            docker logs veka-discord-bot 2>&1 | tail -50 || true
            exit 1
          fi
